<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incy Wincy Spider</title>

    <meta name="description"
        content="An illustrated version of the Incy Wincy Spider nursery rhyme.">

    <link rel="icon" href="Assets/favicon.svg" type="image/svg+xml">

    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500&family=Lora&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="Incy.css">
</head>

<body>

    <!-- Logo -->
    <img src="Assets/ten10-logo-2021-light.svg" alt="Ten10 logo" class="logo">

    <!-- Weather Toggle -->
    <div class="toggle-container">
        <button id="rain-btn" class="toggle-btn active">🌧️ Rain</button>
        <button id="sun-btn" class="toggle-btn">☀️ Sun</button>
    </div>

    <!-- Dark Mode -->
    <div class="mode-toggle">
        <button id="mode-btn">🌙 Dark Mode</button>
    </div>

    <!-- Effects -->
    <div id="rain" class="rain"></div>

    <div id="sun-container" class="sun-container">
        <div class="sun"></div>
        <div class="sun-rays"></div>
    </div>

    <!-- Main -->
    <main>
        <div class="card">
            <h1>Incy Wincy Spider</h1>
            <div class="divider"></div>

            <div class="poem">
                <p>
                    Incy Wincy spider climbed up the water spout,<br>
                    Down came the rain and washed poor Incy out,<br>
                    Out came the sunshine and dried up all the rain,<br>
                    And Incy Wincy spider climbed up the spout again.
                </p>
            </div>

            <div class="spider-section">
                <pre class="ascii-art">
      (simple spider here)
                </pre>
            </div>
        </div>
    </main>

    <footer>
        <p>Learning Git Project</p>
    </footer>

    <script src="Incy.js"></script>
</body>

</html>
